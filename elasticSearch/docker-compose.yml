services:
  elasticsearch:
    image: elasticsearch:8.19.16
    container_name: elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false

    ports:
      - "9200:9200"
      - "9300:9300"

    volumes:
      - elastic_data:/usr/share/elasticsearch/data

    restart: unless-stopped
volumes:
  elastic_data:

